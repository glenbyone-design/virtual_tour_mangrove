<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#276b1e",
                        "background-light": "#f6f8f6",
                        "background-dark": "#0a1109",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Mangrove Waropen - Admin Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="relative w-full max-w-md overflow-hidden bg-white dark:bg-[#131d12] rounded-xl shadow-2xl border border-primary/10">
<div class="relative h-48 w-full overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-[#131d12] z-10"></div>
<div class="w-full h-full bg-center bg-cover" data-alt="Dense green mangrove forest landscape aerial view" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAWZ7pPxPkJoRZRr0WAEbd6ZhRntfi3XCPTpv4chH0FwJyc1kdbRMlVXqmVcg-ZP5AksQihkXlmLc4TILYjdA-jzJGm3yOKSmpyg4jjKhEbgUkNY8dPmaKU9PBZBFMDEZl_D7Iq_Pvexuv2XwmWVyGHsnKcSpa6w_CRXdlOLlNj_U3RxcV_7dfbFk9pPs0aezhmPISi_CmTkdqLMwwscvcTYGYilpIOKSb3U0_2YplTEXHgGYcqr45fIVlbwiJqfPCG_I5HLc8beKM");'>
</div>
<div class="absolute inset-0 flex flex-col items-center justify-center z-20 pt-8">
<div class="bg-primary/20 p-3 rounded-full backdrop-blur-sm mb-2 border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl">eco</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-white">Mangrove Waropen</h1>
</div>
</div>
<div class="px-8 pb-10 pt-4">
<div class="text-center mb-8">
<h2 class="text-xl font-semibold text-slate-900 dark:text-slate-100">Admin Portal</h2>
<p class="text-slate-500 dark:text-primary/60 text-sm mt-1">Please enter your credentials to continue</p>
</div>
<form id="adminLoginForm" class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60">person</span>
<input id="username" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white dark:placeholder:text-primary/30" placeholder="Admin username" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60">lock</span>
<input id="password" required class="w-full pl-12 pr-12 py-3.5 bg-slate-50 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white dark:placeholder:text-primary/30" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-primary/60 hover:text-primary" type="button" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password';">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 rounded border-primary/30 text-primary focus:ring-primary bg-transparent" id="remember" type="checkbox"/>
<label class="text-xs text-slate-500 dark:text-slate-400" for="remember">Remember this device for 30 days</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Secure Login</span>
<span class="material-symbols-outlined text-lg">login</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-primary/10 text-center">
<p class="text-xs text-slate-400 dark:text-primary/40 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-sm">verified_user</span>
                    End-to-end encrypted admin access
                </p>
</div>
</div>
</div>
<div class="fixed bottom-6 text-center w-full pointer-events-none">
<p class="text-[10px] uppercase tracking-widest text-slate-400 dark:text-primary/30 font-bold">
            © 2024 Mangrove Waropen Protection Systems
        </p>
<script>
document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    
    // Validasi sederhana untuk Prototype
    if(user === 'admin' && pass === '12345') {
        alert('Login Berhasil! Mengalihkan ke Dashboard...');
        // Simpan sesi login lokal sementara
        localStorage.setItem('admin_logged_in', 'true');
        // Jembatan masuk ke Dashboard Statistik Utama
        window.location.href = '../dashboard_statistik_admin_1/code.html';
    } else {
        alert('Gagal: Username atau password salah!\n\n(Hint: Gunakan admin / 12345 untuk mencoba)');
    }
});
</script>
</body></html>
