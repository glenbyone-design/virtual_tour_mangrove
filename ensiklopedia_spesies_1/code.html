</label>
<!-- Horizontal Categories -->

<button data-filter="Semua" class="filter-btn flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-primary px-4 text-white text-sm font-medium transition-colors">
                    Semua
                </button>
<button data-filter="Rhizophora" class="filter-btn flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-primary/10 dark:bg-primary/20 px-4 text-primary text-sm font-medium border border-primary/20 hover:bg-primary/20 transition-colors">

<button data-filter="Avicennia" class="filter-btn flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-primary/10 dark:bg-primary/20 px-4 text-primary text-sm font-medium border border-primary/20 hover:bg-primary/20 transition-colors">

<button data-filter="Sonneratia" class="filter-btn flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-primary/10 dark:bg-primary/20 px-4 text-primary text-sm font-medium border border-primary/20 hover:bg-primary/20 transition-colors">

</a>
<a class="flex flex-col items-center justify-center gap-1 text-primary w-16" href="../ensiklopedia_spesies_1/code.html">

</div>
</div>
<a class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors w-16" href="../virtual_tour_360_1/code.html">
<span class="material-symbols-outlined">explore</span>
<p class="text-[10px] font-medium">Tur</p>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors w-16" href="../index.html">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium">Profil</p>
</a>
</div>
</nav>

<script>
let allSpesiesData = [];
let currentFilter = "Semua";

async function loadEnsiklopedia() {
    try {
        const response = await fetch('http://localhost:3000/api/spesies');
        allSpesiesData = await response.json();
        renderList(allSpesiesData);
    } catch(err) {
        document.getElementById('spesiesList').innerHTML = '<div class="text-red-500 text-center">Gagal menyambungkan ke Database. Pastikan server nyala.</div>';
    }
}

function renderList(data) {
    const badge = document.querySelector('h2 + span');
    if (badge) badge.innerText = data.length + ' Spesies';
    
    const container = document.getElementById('spesiesList');
    container.innerHTML = '';
    
    if (data.length === 0) {
        container.innerHTML = '<div class="text-center text-slate-500 p-8">Tidak ditemukan spesies yang sesuai.</div>';
        return;
    }
    
    data.forEach(item => {
        const cardHtml = `
        <div onclick="window.location.href='../detail_spesies_mangrove/code.html?id=${item.id}'" class="bg-white dark:bg-slate-900/40 rounded-xl overflow-hidden border border-slate-200 dark:border-primary/10 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all cursor-pointer">
            <div class="flex h-32">
                <div class="w-1/3 h-full overflow-hidden bg-primary/5 flex items-center justify-center">
                    <img class="w-full h-full object-cover" src="${item.gambar}" onerror="this.src='https://placehold.co/400x400/276b1e/ffffff?text=Mangrove'" />
                </div>
                <div class="flex-1 p-4 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-slate-900 dark:text-slate-100">${item.nama_lokal}</h3>
                            <span class="material-symbols-outlined text-primary/40 text-lg">arrow_forward</span>
                        </div>
                        <p class="text-xs italic text-primary font-medium">${item.nama_ilmiah}</p>
                    </div>
                    <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-2 mt-2">${item.deskripsi}</p>
                </div>
            </div>
        </div>`;
        container.innerHTML += cardHtml;
    });
}

function applyFilters() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    
    const filteredData = allSpesiesData.filter(item => {
        const matchSearch = item.nama_lokal.toLowerCase().includes(query) || item.nama_ilmiah.toLowerCase().includes(query) || item.deskripsi.toLowerCase().includes(query);
        const matchCategory = currentFilter === "Semua" || item.nama_ilmiah.includes(currentFilter);
        return matchSearch && matchCategory;
    });
    
    renderList(filteredData);
}

// Event Listeners
document.getElementById('searchInput').addEventListener('input', applyFilters);

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        // Update styling
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('bg-primary', 'text-white');
            b.classList.add('bg-primary/10', 'text-primary');
        });
        const clicked = e.currentTarget;
        clicked.classList.remove('bg-primary/10', 'text-primary');
        clicked.classList.add('bg-primary', 'text-white');
        
        currentFilter = clicked.dataset.filter;
        applyFilters();
    });
});

// Mulai pengambilan data setelah seluruh HTML dimuat
window.addEventListener('DOMContentLoaded', loadEnsiklopedia);
</script>
