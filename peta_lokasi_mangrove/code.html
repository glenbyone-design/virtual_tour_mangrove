<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#276b1e",
                        "background-light": "#f6f8f6",
                        "background-dark": "#151f13",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Waropen Mangrove Map</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-primary/20 justify-between shrink-0">
<div class="flex items-center gap-3">
<div class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-primary/10 cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Waropen Forest</h2>
<p class="text-xs text-primary font-medium">Papua, Indonesia</p>
</div>
</div>
<div class="flex gap-2">
<button class="flex size-10 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">share</span>
</button>
<button class="flex size-10 items-center justify-center rounded-lg bg-primary text-slate-100">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="relative flex-1 flex flex-col">
<!-- Map Interface -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-slate-200 dark:bg-slate-800 relative overflow-hidden" data-alt="Satellite view of lush green mangrove forest river delta" data-location="Waropen Mangrove Forest, Papua" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDaB6oP9IRR0PuHHZBrXJa-lpOGEUkA4RB9xQ_8u2sTLbPUuZnajDfNV_WDhI3cZklibOq_afWM3JIJ8pfaxy-SCHiD0hYFNQclCQa9Gp4ECo1x8kyFEVioVDeiOhq0BNBFwQBWalkpPECkwCAboRhwVNU6nfP7ld22fLWaW8ZYKEhdEDpEASAcpw5YpzeFn98Bg97EYZlCHirJdvCWduuvk3KmWXg5Zw63IWKNzDcC7331Rj3tkhOKqJUKbDUA-wbplNN59yADjLw'); background-size: cover; background-position: center;">
<!-- Markers -->
<!-- Kali Biru -->
<div class="absolute top-1/4 left-1/3 group cursor-pointer">
<div class="flex flex-col items-center">
<div class="bg-slate-900/80 backdrop-blur px-2 py-1 rounded mb-1 border border-primary/30">
<p class="text-[10px] font-bold text-white uppercase tracking-wider">Kali Biru</p>
</div>
<div class="size-8 bg-primary rounded-full flex items-center justify-center border-2 border-white shadow-lg animate-pulse">
<span class="material-symbols-outlined text-white text-sm">water_drop</span>
</div>
</div>
</div>
<!-- Labirin Mangrove -->
<div class="absolute top-1/2 left-1/2 group cursor-pointer">
<div class="flex flex-col items-center">
<div class="bg-slate-900/80 backdrop-blur px-2 py-1 rounded mb-1 border border-primary/30">
<p class="text-[10px] font-bold text-white uppercase tracking-wider">Labirin Mangrove</p>
</div>
<div class="size-8 bg-primary rounded-full flex items-center justify-center border-2 border-white shadow-lg">
<span class="material-symbols-outlined text-white text-sm">forest</span>
</div>
</div>
</div>
<!-- Observation Deck -->
<div class="absolute bottom-1/3 right-1/4 group cursor-pointer">
<div class="flex flex-col items-center">
<div class="bg-slate-900/80 backdrop-blur px-2 py-1 rounded mb-1 border border-primary/30">
<p class="text-[10px] font-bold text-white uppercase tracking-wider">Observation Deck</p>
</div>
<div class="size-8 bg-amber-600 rounded-full flex items-center justify-center border-2 border-white shadow-lg">
<span class="material-symbols-outlined text-white text-sm">visibility</span>
</div>
</div>
</div>
</div>
</div>
<!-- Overlay Search and Filters -->
<div class="relative z-10 p-4 pointer-events-none">
<div class="max-w-md mx-auto w-full flex flex-col gap-3 pointer-events-auto">
<!-- Search Bar -->
<label class="flex flex-col w-full shadow-xl">
<div class="flex w-full h-12 items-stretch rounded-xl bg-background-light dark:bg-background-dark border border-primary/20 overflow-hidden">
<div class="text-primary flex items-center justify-center pl-4">
<span class="material-symbols-outlined">search</span>
</div>
<input class="form-input flex w-full border-none bg-transparent focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 px-4 text-base font-normal leading-normal" placeholder="Search points of interest..."/>
</div>
</label>
<!-- Fast Filters -->
<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary text-white px-4 text-sm font-medium shadow-md">
<span class="material-symbols-outlined text-sm">all_inclusive</span>
                            All
                        </button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-background-light dark:bg-background-dark text-slate-700 dark:text-slate-300 border border-primary/20 px-4 text-sm font-medium shadow-md hover:bg-primary/5">
<span class="material-symbols-outlined text-sm">water</span>
                            Waterways
                        </button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-background-light dark:bg-background-dark text-slate-700 dark:text-slate-300 border border-primary/20 px-4 text-sm font-medium shadow-md hover:bg-primary/5">
<span class="material-symbols-outlined text-sm">cruelty_free</span>
                            Wildlife
                        </button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-background-light dark:bg-background-dark text-slate-700 dark:text-slate-300 border border-primary/20 px-4 text-sm font-medium shadow-md hover:bg-primary/5">
<span class="material-symbols-outlined text-sm">deck</span>
                            Rest Area
                        </button>
</div>
</div>
</div>
<!-- Map Controls -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 z-10 flex flex-col gap-2">
<div class="flex flex-col rounded-xl overflow-hidden shadow-xl border border-primary/20 bg-background-light dark:bg-background-dark">
<button class="flex size-11 items-center justify-center hover:bg-primary/10 border-b border-primary/10">
<span class="material-symbols-outlined text-primary">add</span>
</button>
<button class="flex size-11 items-center justify-center hover:bg-primary/10">
<span class="material-symbols-outlined text-primary">remove</span>
</button>
</div>
<button class="flex size-11 items-center justify-center rounded-xl bg-background-light dark:bg-background-dark text-primary shadow-xl border border-primary/20 hover:bg-primary/10">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Legend Card (Floating Bottom) -->
<div class="absolute bottom-6 left-4 right-4 z-10">
<div class="max-w-md mx-auto bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md rounded-2xl border border-primary/30 p-4 shadow-2xl">
<div class="flex items-center justify-between mb-3">
<h3 class="font-bold text-sm uppercase tracking-widest text-primary">Map Legend</h3>
<span class="material-symbols-outlined text-slate-400 text-sm">info</span>
</div>
<div class="grid grid-cols-2 gap-y-3 gap-x-4">
<div class="flex items-center gap-3">
<div class="size-3 rounded-full bg-primary shadow-sm shadow-primary/50"></div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-300">Natural Landmark</span>
</div>
<div class="flex items-center gap-3">
<div class="size-3 rounded-full bg-amber-600 shadow-sm shadow-amber-600/50"></div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-300">Observation Point</span>
</div>
<div class="flex items-center gap-3">
<div class="size-3 rounded-full bg-blue-500 shadow-sm shadow-blue-500/50"></div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-300">Boat Access</span>
</div>
<div class="flex items-center gap-3">
<div class="size-3 rounded-full bg-emerald-400 shadow-sm shadow-emerald-400/50"></div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-300">Conservation Zone</span>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="shrink-0 flex gap-2 border-t border-primary/20 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2 z-20">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-semibold leading-normal">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">map</span>
<p class="text-[10px] font-semibold leading-normal">Map</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">explore</span>
<p class="text-[10px] font-semibold leading-normal">Guide</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-semibold leading-normal">Profile</p>
</a>
</nav>
</div>
</body></html>
