</div>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-slate-200 dark:border-primary/30 p-4 flex-row-reverse cursor-pointer hover:bg-primary/5 transition-colors">

</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-slate-200 dark:border-primary/30 p-4 flex-row-reverse cursor-pointer hover:bg-primary/5 transition-colors">

<div class="flex grow items-center gap-3">

<div class="flex items-center justify-center gap-2 mt-6 text-slate-500 dark:text-slate-400">

</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-primary/20">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2">
